workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.ceren.app"
      android_signing:
        - keystore_reference
      node: 18
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
